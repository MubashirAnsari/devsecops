name: Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PATH_EXTRA: /home/ubuntu/bin:/home/ubuntu/.local/bin:/home/ubuntu/.npm-global/bin

jobs:
  security-scan:
    name: Security Scan
    runs-on: self-hosted
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Stage 1: Gitleaks - secrets scan
      - name: Gitleaks - secrets scan
        id: gitleaks
        continue-on-error: true
        run: |
          export PATH=$PATH:$PATH_EXTRA
          gitleaks detect \
            --source . \
            --no-git \
            -v \
            --report-format json \
            --report-path gitleaks-report.json \
            --exit-code 1 \
            2>&1

      # Stage 2: TruffleHog - verified secrets
      - name: TruffleHog - verified secrets
        id: trufflehog
        continue-on-error: true
        run: |
          export PATH=$PATH:$PATH_EXTRA
          set +e
          trufflehog filesystem . \
            --only-verified \
            --fail \
            --no-update \
            --json \
            2>&1 | tee trufflehog-output.txt
          TRUFFLEHOG_EXIT=${PIPESTATUS[0]}
          set -e

          python3 - <<'PYEOF'
          import json, sys, os

          output_file = "trufflehog-output.txt"
          findings = []

          if os.path.exists(output_file):
              with open(output_file) as f:
                  for line in f:
                      line = line.strip()
                      if line.startswith('{'):
                          try:
                              data = json.loads(line)
                              if data.get("Verified"):
                                  findings.append(data)
                          except:
                              pass

          with open("trufflehog-report.json", "w") as f:
              json.dump(findings, f)

          if findings:
              print(f"FAILED: {len(findings)} verified secret(s) found")
              sys.exit(1)
          else:
              print("PASSED: No verified secrets found")
          PYEOF

      # Stage 3: Bandit - Python SAST
      - name: Bandit - Python SAST
        id: bandit
        continue-on-error: true
        run: |
          export PATH=$PATH:$PATH_EXTRA
          bandit -r . \
            --severity-level high \
            --confidence-level high \
            --exclude .git,node_modules,.venv,venv \
            -f json \
            -o bandit-report.json \
            || true

          python3 - <<'PYEOF'
          import json, sys, os

          report_file = "bandit-report.json"
          if not os.path.exists(report_file):
              print("PASSED: No Python files found")
              sys.exit(0)

          with open(report_file) as f:
              report = json.load(f)

          results = report.get("results", [])
          high_issues = [r for r in results if r["issue_severity"] == "HIGH" and r["issue_confidence"] == "HIGH"]

          if high_issues:
              print(f"FAILED: {len(high_issues)} high severity issue(s) found")
              sys.exit(1)
          else:
              print("PASSED: No high severity Python issues found")
          PYEOF

      # Stage 4: pip-audit - Python CVEs
      - name: pip-audit - Python CVEs
        id: pip_audit
        continue-on-error: true
        run: |
          export PATH=$PATH:$PATH_EXTRA
          if find . -name "requirements.txt" \
              -not -path "*/.git/*" | grep -q .; then
            grep -v "^git+" requirements.txt | \
              pip-audit -r /dev/stdin --skip-editable -f json -o pip-audit-report.json || true

            python3 - <<'PYEOF'
          import json, sys, os

          report_file = "pip-audit-report.json"
          if not os.path.exists(report_file):
              print("PASSED: No Python CVEs found")
              sys.exit(0)

          with open(report_file) as f:
              report = json.load(f)

          vulns = [
              dep for dep in report.get("dependencies", [])
              if dep.get("vulns")
          ]

          if vulns:
              total = sum(len(d["vulns"]) for d in vulns)
              print(f"FAILED: {total} Python CVE(s) found")
              sys.exit(1)
          else:
              print("PASSED: No Python CVEs found")
          PYEOF
          else
            echo "SKIPPED: No requirements.txt found"
          fi

      # Stage 5: npm audit - JS dependency CVEs
      - name: npm audit - JS dependency CVEs
        id: npm_audit
        continue-on-error: true
        run: |
          export PATH=$PATH:$PATH_EXTRA
          if find . -name "package.json" \
              -not -path "*/node_modules/*" \
              -not -path "*/.git/*" | grep -q .; then
            PKG_DIR=$(find . -name "package.json" \
              -not -path "*/node_modules/*" \
              -not -path "*/.git/*" | head -1 | xargs dirname)
            cd $PKG_DIR
            npm install --package-lock-only --quiet 2>/dev/null || true
            npm audit --audit-level=high --json > npm-audit-report.json 2>&1 || true

            python3 - <<'PYEOF'
          import json, sys, os
          report_file = "npm-audit-report.json"
          if not os.path.exists(report_file):
              print("SKIPPED: No npm audit report generated")
              sys.exit(0)
          try:
              with open(report_file) as f:
                  report = json.load(f)
              vulns = report.get("metadata", {}).get("vulnerabilities", {})
              high = vulns.get("high", 0)
              critical = vulns.get("critical", 0)
              total = high + critical
              if total > 0:
                  print(f"FAILED: {total} high/critical JS dependency vulnerabilities found")
                  sys.exit(1)
              else:
                  print("PASSED: No high/critical JS dependency vulnerabilities found")
          except Exception as e:
              print(f"SKIPPED: Could not parse npm audit report: {e}")
          PYEOF
          else
            echo "SKIPPED: No package.json found"
          fi

      # Stage 6: ESLint - JS/TS/JSX security
      - name: ESLint - JS/TS/JSX security
        id: eslint
        continue-on-error: true
        run: |
          export PATH=$PATH:$PATH_EXTRA
          if find . \( -name "*.js" -o -name "*.jsx" -o -name "*.ts" -o -name "*.tsx" \) \
              -not -path "*/node_modules/*" -not -path "*/.git/*" | grep -q .; then
            if [ -f ".eslintrc-security.json" ]; then
              NODE_PATH=/home/ubuntu/.npm-global/lib/node_modules eslint --no-eslintrc \
                -c .eslintrc-security.json \
                --resolve-plugins-relative-to /home/ubuntu/.npm-global/lib/node_modules \
                --ext .js,.jsx,.ts,.tsx \
                -f json \
                -o eslint-report.json \
                . || true

              python3 - <<'PYEOF'
          import json, sys, os
          report_file = "eslint-report.json"
          if not os.path.exists(report_file):
              print("PASSED: No JS/TS issues found")
              sys.exit(0)
          with open(report_file) as f:
              report = json.load(f)
          SECURITY_RULES = ('security/', 'no-unsanitized/')
          errors = 0
          for r in report:
              for msg in r.get('messages', []):
                  if msg.get('severity') == 2:
                      rule_id = msg.get('ruleId') or ''
                      if any(rule_id.startswith(p) for p in SECURITY_RULES):
                          errors += 1
          if errors > 0:
              print(f"FAILED: {errors} JS/TS security issue(s) found")
              sys.exit(1)
          else:
              print("PASSED: No JS/TS security issues found")
          PYEOF
            else
              echo "SKIPPED: .eslintrc-security.json not found"
            fi
          else
            echo "SKIPPED: No JS/TS files found"
          fi

      # Stage 7: Dependency pinning enforcement
      - name: Dependency pinning check
        id: dep_pinning
        continue-on-error: true
        run: |
          export PATH=$PATH:$PATH_EXTRA
          if find . -name "requirements.txt" \
              -not -path "*/.git/*" | grep -q .; then

            python3 - <<'PYEOF'
          import sys, re

          unpinned = []
          with open("requirements.txt") as f:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith("#") or line.startswith("git+"):
                      continue
                  if re.search(r'[=><!~]=', line):
                      continue
                  unpinned.append(line)

          if unpinned:
              print(f"FAILED: {len(unpinned)} unpinned package(s) found:")
              for p in unpinned:
                  print(f"  - {p}")
              sys.exit(1)
          else:
              print("PASSED: All packages are pinned")
          PYEOF
          else
            echo "SKIPPED: No requirements.txt found"
          fi

      # Stage 8: Brakeman - Ruby SAST
      - name: Brakeman - Ruby SAST
        id: brakeman
        continue-on-error: true
        run: |
          export PATH=$PATH:$PATH_EXTRA
          if [ -f "Gemfile" ] || ls *.gemspec 2>/dev/null | grep -q .; then
            if command -v brakeman &>/dev/null; then
              brakeman --no-pager \
                --no-progress \
                --format json \
                --output brakeman-report.json \
                --confidence-level 2 \
                . || true

              python3 - <<'PYEOF'
          import json, sys, os

          report_file = "brakeman-report.json"
          if not os.path.exists(report_file):
              print("PASSED: No Ruby security issues found")
              sys.exit(0)

          with open(report_file) as f:
              report = json.load(f)

          warnings = report.get("warnings", [])
          high_warnings = [w for w in warnings if w.get("confidence") == "High"]

          if high_warnings:
              print(f"FAILED: {len(high_warnings)} high confidence Ruby security issue(s) found")
              sys.exit(1)
          else:
              print("PASSED: No high confidence Ruby security issues found")
          PYEOF
            else
              echo "SKIPPED: brakeman not installed"
            fi
          else
            echo "SKIPPED: No Gemfile found"
          fi

      # Stage 9: bundler-audit - Ruby CVEs
      - name: bundler-audit - Ruby CVEs
        id: bundler_audit
        continue-on-error: true
        run: |
          export PATH=$PATH:$PATH_EXTRA
          if [ -f "Gemfile" ]; then
            if command -v bundle-audit &>/dev/null; then
              bundle-audit update --quiet || true
              bundle-audit check --format json > bundler-audit-report.json 2>&1 || true

              python3 - <<'PYEOF'
          import json, sys, os

          report_file = "bundler-audit-report.json"
          if not os.path.exists(report_file):
              print("PASSED: No Ruby CVEs found")
              sys.exit(0)

          try:
              with open(report_file) as f:
                  report = json.load(f)

              vulns = report.get("results", [])
              if vulns:
                  print(f"FAILED: {len(vulns)} Ruby gem CVE(s) found")
                  sys.exit(1)
              else:
                  print("PASSED: No Ruby CVEs found")
          except Exception as e:
              print(f"SKIPPED: Could not parse bundler-audit report: {e}")
          PYEOF
            else
              echo "SKIPPED: bundle-audit not installed"
            fi
          else
            echo "SKIPPED: No Gemfile found"
          fi

      # Stage 10: Post all findings as PR comment
      - name: Post security findings to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const gitleaksOutcome = '${{ steps.gitleaks.outcome }}';
            const trufflehogOutcome = '${{ steps.trufflehog.outcome }}';
            const banditOutcome = '${{ steps.bandit.outcome }}';
            const pipAuditOutcome = '${{ steps.pip_audit.outcome }}';
            const npmAuditOutcome = '${{ steps.npm_audit.outcome }}';
            const eslintOutcome = '${{ steps.eslint.outcome }}';
            const depPinningOutcome = '${{ steps.dep_pinning.outcome }}';
            const brakemanOutcome = '${{ steps.brakeman.outcome }}';
            const bundlerAuditOutcome = '${{ steps.bundler_audit.outcome }}';

            const anyFailed = [
              gitleaksOutcome, trufflehogOutcome, banditOutcome,
              pipAuditOutcome, npmAuditOutcome, eslintOutcome,
              depPinningOutcome, brakemanOutcome, bundlerAuditOutcome
            ].some(o => o === 'failure');

            if (!anyFailed) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '## ✅ Security Scan Passed\n\nAll security checks passed. This PR is safe to review.\n\n_Powered by Hyly.AI DevSecOps Pipeline_'
              });
              return;
            }

            let comment = '## ❌ Security Scan Failed\n\n';
            comment += 'The following security issues were found. Please fix them before this PR can be merged.\n\n';

            // Gitleaks findings
            if (gitleaksOutcome === 'failure' && fs.existsSync('gitleaks-report.json')) {
              try {
                const report = JSON.parse(fs.readFileSync('gitleaks-report.json', 'utf8'));
                if (report && report.length > 0) {
                  comment += '### 🔑 Secrets Detected (Gitleaks)\n\n';
                  report.forEach(leak => {
                    comment += `- **${leak.RuleID}** in \`${leak.File}\` line ${leak.StartLine}\n`;
                    comment += `  - Description: ${leak.Description}\n\n`;
                  });
                }
              } catch(e) {
                comment += '### 🔑 Secrets Detected (Gitleaks)\n\nSecrets found - check workflow logs for details.\n\n';
              }
            }

            // TruffleHog findings
            if (trufflehogOutcome === 'failure' && fs.existsSync('trufflehog-report.json')) {
              try {
                const findings = JSON.parse(fs.readFileSync('trufflehog-report.json', 'utf8'));
                if (findings && findings.length > 0) {
                  comment += '### 🔑 Verified Secrets (TruffleHog)\n\n';
                  findings.forEach(f => {
                    comment += `- **${f.DetectorName || 'Secret'}** detected\n`;
                    comment += `  - File: \`${f.SourceMetadata?.Data?.Filesystem?.file || 'unknown'}\`\n\n`;
                  });
                }
              } catch(e) {
                comment += '### 🔑 Verified Secrets (TruffleHog)\n\nVerified secrets found - check workflow logs.\n\n';
              }
            }

            // Bandit findings
            if (banditOutcome === 'failure' && fs.existsSync('bandit-report.json')) {
              try {
                const report = JSON.parse(fs.readFileSync('bandit-report.json', 'utf8'));
                const highIssues = report.results.filter(r =>
                  r.issue_severity === 'HIGH' && r.issue_confidence === 'HIGH'
                );
                if (highIssues.length > 0) {
                  comment += '### 🐍 Python Security Issues (Bandit)\n\n';
                  highIssues.forEach(issue => {
                    comment += `- **[${issue.test_id}]** ${issue.issue_text}\n`;
                    comment += `  - File: \`${issue.filename}\` line ${issue.line_number}\n`;
                    comment += `  - More info: ${issue.more_info}\n\n`;
                  });
                }
              } catch(e) {
                comment += '### 🐍 Python Security Issues (Bandit)\n\nIssues found - check workflow logs.\n\n';
              }
            }

            // pip-audit findings
            if (pipAuditOutcome === 'failure' && fs.existsSync('pip-audit-report.json')) {
              try {
                const report = JSON.parse(fs.readFileSync('pip-audit-report.json', 'utf8'));
                const affected = (report.dependencies || []).filter(d => d.vulns && d.vulns.length > 0);
                if (affected.length > 0) {
                  comment += '### 🐍 Python CVEs (pip-audit)\n\n';
                  affected.forEach(dep => {
                    dep.vulns.forEach(vuln => {
                      comment += `- **${dep.name}@${dep.version}** — ${vuln.id}\n`;
                      if (vuln.description) comment += `  - ${vuln.description}\n`;
                      if (vuln.fix_versions && vuln.fix_versions.length > 0) {
                        comment += `  - Fix: upgrade to **${dep.name}@${vuln.fix_versions[0]}**\n`;
                      }
                      comment += '\n';
                    });
                  });
                }
              } catch(e) {
                comment += '### 🐍 Python CVEs (pip-audit)\n\nCVEs found - check workflow logs for details.\n\n';
              }
            }

            // npm audit findings
            if (npmAuditOutcome === 'failure' && fs.existsSync('npm-audit-report.json')) {
              try {
                const report = JSON.parse(fs.readFileSync('npm-audit-report.json', 'utf8'));
                const vulns = report.metadata?.vulnerabilities || {};
                const total = (vulns.high || 0) + (vulns.critical || 0);
                if (total > 0) {
                  comment += '### 📦 JS Dependency Vulnerabilities (npm audit)\n\n';
                  comment += `- **${total} high/critical vulnerabilities** found `;
                  comment += `(High: ${vulns.high || 0}, Critical: ${vulns.critical || 0})\n\n`;
                  const packages = report.vulnerabilities || {};
                  Object.entries(packages).forEach(([pkgName, pkg]) => {
                    if (pkg.severity === 'high' || pkg.severity === 'critical') {
                      comment += `- **${pkgName}@${pkg.range || 'unknown'}** — ${pkg.severity.toUpperCase()}\n`;
                      if (Array.isArray(pkg.via)) {
                        pkg.via.forEach(v => {
                          if (typeof v === 'object' && v.title) {
                            comment += `  - ${v.title}\n`;
                            if (v.url) comment += `  - Advisory: ${v.url}\n`;
                          }
                        });
                      }
                      if (pkg.fixAvailable && typeof pkg.fixAvailable === 'object') {
                        comment += `  - Fix: upgrade to **${pkg.fixAvailable.name}@${pkg.fixAvailable.version}**\n`;
                      } else if (pkg.fixAvailable === true) {
                        comment += `  - Fix available: run \`npm audit fix\`\n`;
                      }
                      comment += '\n';
                    }
                  });
                }
              } catch(e) {
                comment += '### 📦 JS Dependency Vulnerabilities (npm audit)\n\nVulnerabilities found - run npm audit locally.\n\n';
              }
            }

            // ESLint findings
            if (eslintOutcome === 'failure' && fs.existsSync('eslint-report.json')) {
              try {
                const report = JSON.parse(fs.readFileSync('eslint-report.json', 'utf8'));
                const files = report.filter(f => f.errorCount > 0);
                if (files.length > 0) {
                  comment += '### 🟨 JavaScript Security Issues (ESLint)\n\n';
                  files.forEach(file => {
                    const shortPath = file.filePath.replace(process.cwd(), '');
                    file.messages.filter(m => m.severity === 2).forEach(msg => {
                      comment += `- **${msg.ruleId}** in \`${shortPath}\` line ${msg.line}\n`;
                      comment += `  - ${msg.message}\n\n`;
                    });
                  });
                }
              } catch(e) {
                comment += '### 🟨 JavaScript Security Issues (ESLint)\n\nIssues found - check workflow logs.\n\n';
              }
            }

            // Dependency pinning findings
            if (depPinningOutcome === 'failure' && fs.existsSync('requirements.txt')) {
              const lines = fs.readFileSync('requirements.txt', 'utf8').split('\n');
              const unpinned = lines.filter(l => {
                l = l.trim();
                return l && !l.startsWith('#') && !l.startsWith('git+') && !/[=><!~]=/.test(l);
              });
              if (unpinned.length > 0) {
                comment += '### 📌 Unpinned Dependencies\n\n';
                comment += 'Pin these packages in `requirements.txt` to avoid supply chain risks:\n\n';
                unpinned.forEach(p => {
                  comment += `- \`${p}\` — add a version e.g. \`${p}==x.y.z\`\n`;
                });
                comment += '\n> Run `pip show <package>` to find the current installed version.\n\n';
              }
            }

            // Brakeman findings
            if (brakemanOutcome === 'failure' && fs.existsSync('brakeman-report.json')) {
              try {
                const report = JSON.parse(fs.readFileSync('brakeman-report.json', 'utf8'));
                const warnings = (report.warnings || []).filter(w => w.confidence === 'High');
                if (warnings.length > 0) {
                  comment += '### 💎 Ruby Security Issues (Brakeman)\n\n';
                  warnings.forEach(w => {
                    comment += `- **${w.warning_type}** in \`${w.file}\` line ${w.line}\n`;
                    comment += `  - ${w.message}\n`;
                    if (w.link) comment += `  - More info: ${w.link}\n`;
                    comment += '\n';
                  });
                }
              } catch(e) {
                comment += '### 💎 Ruby Security Issues (Brakeman)\n\nIssues found - check workflow logs.\n\n';
              }
            }

            // bundler-audit findings
            if (bundlerAuditOutcome === 'failure' && fs.existsSync('bundler-audit-report.json')) {
              try {
                const report = JSON.parse(fs.readFileSync('bundler-audit-report.json', 'utf8'));
                const vulns = report.results || [];
                if (vulns.length > 0) {
                  comment += '### 💎 Ruby Gem CVEs (bundler-audit)\n\n';
                  vulns.forEach(v => {
                    comment += `- **${v.gem?.name}@${v.gem?.version}** — ${v.advisory?.id || 'CVE unknown'}\n`;
                    if (v.advisory?.title) comment += `  - ${v.advisory.title}\n`;
                    if (v.advisory?.solution) comment += `  - Fix: ${v.advisory.solution}\n`;
                    comment += '\n';
                  });
                }
              } catch(e) {
                comment += '### 💎 Ruby Gem CVEs (bundler-audit)\n\nCVEs found - check workflow logs.\n\n';
              }
            }

            comment += '\n---\n';
            comment += '_Powered by Hyly.AI DevSecOps Pipeline_';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

            if (anyFailed) {
              core.setFailed('Security scan failed - see PR comment for details');
            }

      # Stage 11: Google Chat notification on failure
      - name: Notify Google Chat
        if: always()
        run: |
          export PATH=$PATH:$PATH_EXTRA

          if [ -f "/etc/github-runner/secrets.env" ]; then
            set -a
            source /etc/github-runner/secrets.env
            set +a
          fi

          if [ -z "$GOOGLE_CHAT_WEBHOOK" ]; then
            echo "SKIPPED: GOOGLE_CHAT_WEBHOOK not set in /etc/github-runner/secrets.env"
            exit 0
          fi

          GITLEAKS="${{ steps.gitleaks.outcome }}"
          TRUFFLEHOG="${{ steps.trufflehog.outcome }}"
          BANDIT="${{ steps.bandit.outcome }}"
          PIP_AUDIT="${{ steps.pip_audit.outcome }}"
          NPM_AUDIT="${{ steps.npm_audit.outcome }}"
          ESLINT="${{ steps.eslint.outcome }}"
          DEP_PINNING="${{ steps.dep_pinning.outcome }}"
          BRAKEMAN="${{ steps.brakeman.outcome }}"
          BUNDLER_AUDIT="${{ steps.bundler_audit.outcome }}"

          ANY_FAILED=false
          FAILED_STAGES=""
          for stage in "Gitleaks:$GITLEAKS" "TruffleHog:$TRUFFLEHOG" "Bandit:$BANDIT" "pip-audit:$PIP_AUDIT" "npm audit:$NPM_AUDIT" "ESLint:$ESLINT" "Dep Pinning:$DEP_PINNING" "Brakeman:$BRAKEMAN" "bundler-audit:$BUNDLER_AUDIT"; do
            name="${stage%%:*}"
            outcome="${stage##*:}"
            if [ "$outcome" = "failure" ]; then
              ANY_FAILED=true
              FAILED_STAGES="$FAILED_STAGES $name,"
            fi
          done

          if [ "$ANY_FAILED" = "false" ]; then
            echo "SKIPPED: All stages passed, no notification needed"
            exit 0
          fi

          FAILED_STAGES="${FAILED_STAGES%,}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          REPO="${{ github.repository }}"
          PR_TITLE="${{ github.event.pull_request.title }}"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$GOOGLE_CHAT_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"cardsV2\": [{
                \"cardId\": \"security-alert\",
                \"card\": {
                  \"header\": {
                    \"title\": \"❌ Security Scan Failed\",
                    \"subtitle\": \"$REPO\",
                    \"imageUrl\": \"https://fonts.gstatic.com/s/i/short-term/release/materialsymbolsoutlined/security/default/48px.svg\",
                    \"imageType\": \"CIRCLE\"
                  },
                  \"sections\": [
                    {
                      \"header\": \"Pull Request\",
                      \"widgets\": [
                        {\"decoratedText\": {\"text\": \"$PR_TITLE\", \"startIcon\": {\"knownIcon\": \"BOOKMARK\"}}},
                        {\"decoratedText\": {\"text\": \"Failed: $FAILED_STAGES\", \"startIcon\": {\"knownIcon\": \"STAR\"}}}
                      ]
                    },
                    {
                      \"widgets\": [
                        {\"buttonList\": {\"buttons\": [
                          {\"text\": \"View PR\", \"onClick\": {\"openLink\": {\"url\": \"$PR_URL\"}}, \"color\": {\"red\": 0.83, \"green\": 0.18, \"blue\": 0.18}}
                        ]}}
                      ]
                    }
                  ]
                }
              }]
            }")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          if [ "$HTTP_CODE" = "200" ]; then
            echo "PASSED: Google Chat notification sent"
          else
            echo "WARNING: Google Chat returned HTTP $HTTP_CODE"
            echo "Response: $BODY"
          fi