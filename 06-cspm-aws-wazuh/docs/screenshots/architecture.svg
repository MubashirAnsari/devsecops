<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#F8F9FF"/>
  <rect width="1200" height="60" fill="#1A1F3C"/>
  <text x="600" y="38" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="bold" font-family="Arial, sans-serif">CSPM Pipeline Architecture</text>

  <!-- AWS -->
  <rect x="60" y="120" width="160" height="100" rx="10" fill="#EBF3FF" stroke="#2563EB" stroke-width="2"/>
  <rect x="60" y="120" width="160" height="32" rx="10" fill="#2563EB"/>
  <rect x="60" y="138" width="160" height="14" fill="#2563EB"/>
  <text x="140" y="143" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">AWS Cloud</text>
  <text x="140" y="178" text-anchor="middle" fill="#1E40AF" font-size="11" font-family="Arial, sans-serif">IAM · S3 · EC2 · ECS</text>
  <text x="140" y="196" text-anchor="middle" fill="#1E40AF" font-size="11" font-family="Arial, sans-serif">Lambda · VPC · KMS</text>
  <text x="140" y="212" text-anchor="middle" fill="#1E40AF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">8,000+ resources</text>

  <!-- Arrow -->
  <line x1="220" y1="170" x2="270" y2="170" stroke="#2563EB" stroke-width="2" marker-end="url(#arr)"/>
  <text x="245" y="162" text-anchor="middle" fill="#6B7280" font-size="10" font-family="Arial, sans-serif">read-only</text>

  <!-- Prowler -->
  <rect x="270" y="120" width="160" height="100" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <rect x="270" y="120" width="160" height="32" rx="10" fill="#059669"/>
  <rect x="270" y="138" width="160" height="14" fill="#059669"/>
  <text x="350" y="143" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Prowler CSPM</text>
  <text x="350" y="178" text-anchor="middle" fill="#065F46" font-size="11" font-family="Arial, sans-serif">231 checks · 2 AM daily</text>
  <text x="350" y="196" text-anchor="middle" fill="#065F46" font-size="11" font-family="Arial, sans-serif">CIS · SOC2 · NIST</text>
  <text x="350" y="212" text-anchor="middle" fill="#065F46" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Diff vs baseline</text>

  <!-- Arrow -->
  <line x1="430" y1="170" x2="480" y2="170" stroke="#059669" stroke-width="2" marker-end="url(#arr)"/>
  <text x="455" y="162" text-anchor="middle" fill="#6B7280" font-size="10" font-family="Arial, sans-serif">JSON</text>

  <!-- Wazuh -->
  <rect x="480" y="120" width="160" height="100" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <rect x="480" y="120" width="160" height="32" rx="10" fill="#7C3AED"/>
  <rect x="480" y="138" width="160" height="14" fill="#7C3AED"/>
  <text x="560" y="143" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Wazuh SIEM</text>
  <text x="560" y="178" text-anchor="middle" fill="#4C1D95" font-size="11" font-family="Arial, sans-serif">Custom rules</text>
  <text x="560" y="196" text-anchor="middle" fill="#4C1D95" font-size="11" font-family="Arial, sans-serif">Level 10 / 14</text>
  <text x="560" y="212" text-anchor="middle" fill="#4C1D95" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Alert routing</text>

  <!-- Arrow -->
  <line x1="640" y1="170" x2="690" y2="170" stroke="#7C3AED" stroke-width="2" marker-end="url(#arr)"/>
  <text x="665" y="162" text-anchor="middle" fill="#6B7280" font-size="10" font-family="Arial, sans-serif">trigger</text>

  <!-- Integration -->
  <rect x="690" y="120" width="160" height="100" rx="10" fill="#FFF7ED" stroke="#D97706" stroke-width="2"/>
  <rect x="690" y="120" width="160" height="32" rx="10" fill="#D97706"/>
  <rect x="690" y="138" width="160" height="14" fill="#D97706"/>
  <text x="770" y="143" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Integration Script</text>
  <text x="770" y="178" text-anchor="middle" fill="#92400E" font-size="11" font-family="Arial, sans-serif">Python · MD5 dedup</text>
  <text x="770" y="196" text-anchor="middle" fill="#92400E" font-size="11" font-family="Arial, sans-serif">Notion + Google Chat</text>
  <text x="770" y="212" text-anchor="middle" fill="#92400E" font-size="11" font-weight="bold" font-family="Arial, sans-serif">SLA auto-set</text>

  <!-- Down arrows -->
  <line x1="350" y1="220" x2="350" y2="270" stroke="#059669" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <line x1="770" y1="220" x2="770" y2="270" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- Weekly Summary -->
  <rect x="200" y="270" width="220" height="80" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <rect x="200" y="270" width="220" height="28" rx="10" fill="#059669"/>
  <rect x="200" y="284" width="220" height="14" fill="#059669"/>
  <text x="310" y="289" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Weekly Summary</text>
  <text x="310" y="318" text-anchor="middle" fill="#065F46" font-size="11" font-family="Arial, sans-serif">Monday 8 AM · Google Chat</text>
  <text x="310" y="334" text-anchor="middle" fill="#065F46" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Posture · CIS · Trends</text>

  <!-- Notion -->
  <rect x="590" y="270" width="180" height="80" rx="10" fill="#F8FAFC" stroke="#475569" stroke-width="2"/>
  <rect x="590" y="270" width="180" height="28" rx="10" fill="#475569"/>
  <rect x="590" y="284" width="180" height="14" fill="#475569"/>
  <text x="680" y="289" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Notion Database</text>
  <text x="680" y="318" text-anchor="middle" fill="#1E293B" font-size="11" font-family="Arial, sans-serif">1 page per finding</text>
  <text x="680" y="334" text-anchor="middle" fill="#1E293B" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Status · SLA · Owner</text>

  <!-- GChat -->
  <rect x="790" y="270" width="180" height="80" rx="10" fill="#FFF7ED" stroke="#D97706" stroke-width="2"/>
  <rect x="790" y="270" width="180" height="28" rx="10" fill="#D97706"/>
  <rect x="790" y="284" width="180" height="14" fill="#D97706"/>
  <text x="880" y="289" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Google Chat</text>
  <text x="880" y="318" text-anchor="middle" fill="#92400E" font-size="11" font-family="Arial, sans-serif">Cards v2 · Critical alerts</text>
  <text x="880" y="334" text-anchor="middle" fill="#92400E" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Notion link button</text>

  <!-- Metrics band -->
  <rect x="60" y="390" width="1080" height="90" rx="10" fill="#1A1F3C"/>
  <text x="600" y="415" text-anchor="middle" fill="#8B9FD4" font-size="12" font-family="Arial, sans-serif">SCAN RESULTS</text>
  <text x="180" y="455" text-anchor="middle" fill="#FFFFFF" font-size="26" font-weight="bold" font-family="Arial, sans-serif">83%</text>
  <text x="180" y="472" text-anchor="middle" fill="#8B9FD4" font-size="11" font-family="Arial, sans-serif">Posture Score</text>
  <text x="360" y="455" text-anchor="middle" fill="#FFFFFF" font-size="26" font-weight="bold" font-family="Arial, sans-serif">81%</text>
  <text x="360" y="472" text-anchor="middle" fill="#8B9FD4" font-size="11" font-family="Arial, sans-serif">CIS-6.0 Score</text>
  <text x="540" y="455" text-anchor="middle" fill="#FFFFFF" font-size="26" font-weight="bold" font-family="Arial, sans-serif">231</text>
  <text x="540" y="472" text-anchor="middle" fill="#8B9FD4" font-size="11" font-family="Arial, sans-serif">Checks Run</text>
  <text x="720" y="455" text-anchor="middle" fill="#FFFFFF" font-size="26" font-weight="bold" font-family="Arial, sans-serif">8,031</text>
  <text x="720" y="472" text-anchor="middle" fill="#8B9FD4" font-size="11" font-family="Arial, sans-serif">Resources</text>
  <text x="900" y="455" text-anchor="middle" fill="#4ADE80" font-size="26" font-weight="bold" font-family="Arial, sans-serif">$0</text>
  <text x="900" y="472" text-anchor="middle" fill="#8B9FD4" font-size="11" font-family="Arial, sans-serif">Tooling Cost</text>

  <!-- Dedup note -->
  <rect x="60" y="508" width="1080" height="52" rx="10" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="600" y="530" text-anchor="middle" fill="#92400E" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Smart Deduplication — MD5 hash per finding prevents duplicate alerts</text>
  <text x="600" y="548" text-anchor="middle" fill="#B45309" font-size="11" font-family="Arial, sans-serif">New finding → Notion page created + Google Chat alert  ·  Existing finding → Last Seen updated only</text>

  <!-- Tags -->
  <rect x="60" y="588" width="72" height="24" rx="12" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="96" y="604" text-anchor="middle" fill="#065F46" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Prowler</text>
  <rect x="140" y="588" width="64" height="24" rx="12" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1"/>
  <text x="172" y="604" text-anchor="middle" fill="#4C1D95" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Wazuh</text>
  <rect x="212" y="588" width="52" height="24" rx="12" fill="#EBF3FF" stroke="#2563EB" stroke-width="1"/>
  <text x="238" y="604" text-anchor="middle" fill="#1E40AF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">AWS</text>
  <rect x="272" y="588" width="64" height="24" rx="12" fill="#F8FAFC" stroke="#475569" stroke-width="1"/>
  <text x="304" y="604" text-anchor="middle" fill="#1E293B" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Notion</text>
  <rect x="344" y="588" width="108" height="24" rx="12" fill="#FFF7ED" stroke="#D97706" stroke-width="1"/>
  <text x="398" y="604" text-anchor="middle" fill="#92400E" font-size="11" font-weight="bold" font-family="Arial, sans-serif">CIS Benchmark</text>
  <rect x="460" y="588" width="100" height="24" rx="12" fill="#F0FDF4" stroke="#16A34A" stroke-width="1"/>
  <text x="510" y="604" text-anchor="middle" fill="#14532D" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Open Source</text>
  <rect x="568" y="588" width="96" height="24" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <text x="616" y="604" text-anchor="middle" fill="#1D4ED8" font-size="11" font-weight="bold" font-family="Arial, sans-serif">DevSecOps</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
